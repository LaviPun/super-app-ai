# Shopify CLI app configuration
# This file is usually generated/managed by Shopify CLI.
# Keep appUrl aligned with SHOPIFY_APP_URL in .env.
name = "SuperApp"
client_id = "$SHOPIFY_API_KEY"
application_url = "$SHOPIFY_APP_URL"
embedded = true

[access_scopes]
scopes = "$SCOPES"

[auth]
redirect_urls = [
  "$SHOPIFY_APP_URL/auth/callback",
  "$SHOPIFY_APP_URL/auth",
]
