name: V2 Workers Build

on:
  pull_request:
    paths:
      - 'apps/workers/**'
      - 'packages/platform-contracts/**'
      - 'packages/core/**'
      - 'packages/db/**'
      - 'packages/network-security/**'
      - 'scripts/deployment/**'
      - '.github/workflows/v2-workers-build.yml'
  workflow_dispatch:

env:
  NODE_ENV: test

jobs:
  workers:
    name: Build · Test · Deploy config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace dependencies
        run: |
          pnpm --filter @superapp/platform-contracts build
          pnpm --filter @superapp/core build
          pnpm --filter @superapp/db build
          pnpm --filter @superapp/network-security build

      - name: Build workers
        run: pnpm --filter @superapp/workers build

      - name: Worker unit tests
        run: pnpm --filter @superapp/workers test

      - name: Validate deployment manifest
        run: pnpm deploy:validate
