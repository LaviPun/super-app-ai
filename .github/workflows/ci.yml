name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Shared env block — no secrets here (safe for forks and PRs)
env:
  NODE_ENV: test
  DATABASE_URL: file:./dev.db
  SHOPIFY_API_KEY: ci-placeholder
  SHOPIFY_API_SECRET: ci-placeholder
  SHOPIFY_APP_URL: https://placeholder.example.com
  SCOPES: read_products
  # 32-byte all-zeros key — safe for tests only
  ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
  INTERNAL_ADMIN_PASSWORD: ci-placeholder
  INTERNAL_ADMIN_SESSION_SECRET: ci-placeholder
  CRON_SECRET: ci-placeholder

jobs:
  # ─── Job 1: Quality gates (fast, no secrets) ─────────────────────────────
  quality:
    name: Lint · Typecheck · Prisma Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (web)
        run: pnpm --filter web lint

      - name: Typecheck (web)
        run: pnpm --filter web typecheck

      - name: Typecheck (core)
        run: pnpm --filter @superapp/core typecheck

      - name: Typecheck (rate-limit)
        run: pnpm --filter @superapp/rate-limit typecheck

      - name: Typecheck (platform-contracts)
        run: pnpm --filter @superapp/platform-contracts typecheck

      - name: Typecheck (job-orchestration)
        run: pnpm --filter @superapp/job-orchestration typecheck

      - name: Typecheck (workers)
        run: pnpm --filter @superapp/workers typecheck

      - name: Typecheck (api)
        run: pnpm --filter @superapp/api typecheck

      - name: Prisma validate
        working-directory: apps/web
        run: pnpm exec prisma validate

  # ─── Job 2: Unit tests ───────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: apps/web
        run: pnpm exec prisma generate

      - name: Test (all packages)
        run: pnpm test

  # ─── Job 3: Internal admin Playwright smoke ───────────────────────────────
  e2e-internal:
    name: E2E Internal (Playwright)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Prisma schema
        working-directory: apps/web
        run: pnpm exec prisma db push --skip-generate

      - name: Install Playwright browser
        working-directory: apps/web
        run: pnpm test:e2e:install

      - name: Start web dev server
        working-directory: apps/web
        run: pnpm dev -- --port 4000 > /tmp/web-dev.log 2>&1 &

      - name: Wait for app to boot
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:4000/internal/login >/dev/null; then
              echo "App is up"
              exit 0
            fi
            sleep 2
          done
          echo "App did not start in time"
          cat /tmp/web-dev.log || true
          exit 1

      - name: Run internal AI smoke (probe + stream)
        working-directory: apps/web
        env:
          SMOKE_BASE_URL: http://127.0.0.1:4000
          SMOKE_WITH_STREAM: '1'
        run: pnpm smoke:internal-ai

      - name: Run Playwright internal suite
        working-directory: apps/web
        run: pnpm test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore

      - name: Upload app logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: web-dev-log
          path: /tmp/web-dev.log
          if-no-files-found: ignore

  # ─── Job 4: AI Regression Suite (golden fixtures, no LLM) ─────────────────
  #
  # Runs the golden-fixture eval suite using StubLlmClient.
  # Three quality gates enforced:
  #   • Schema-valid rate  ≥ 99%  (EVAL_THRESHOLD_SCHEMA)
  #   • Compiler-success rate ≥ 99%  (EVAL_THRESHOLD_COMPILER)
  #   • Non-destructive rate = 100%  (EVAL_THRESHOLD_ND — hard requirement)
  #
  # For live LLM eval (nightly or manual):
  #   Set EVAL_PROVIDER_ID secret and run pnpm --filter web evals in a
  #   separate workflow with environment: production.
  evals:
    name: AI Regression Suite
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: apps/web
        run: pnpm exec prisma generate

      - name: Run AI regression suite (golden fixtures, strict gate)
        working-directory: apps/web
        run: pnpm evals --strict
        env:
          # No EVAL_PROVIDER_ID → uses StubLlmClient (deterministic, no API key)
          EVAL_THRESHOLD_SCHEMA: '0.99'
          EVAL_THRESHOLD_COMPILER: '0.99'
          EVAL_THRESHOLD_ND: '1.0'

  # ─── Job 5: Build ───────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, e2e-internal, evals]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (web)
        working-directory: apps/web
        run: pnpm build
        env:
          NODE_ENV: production
          SHOPIFY_API_KEY: ${{ secrets.SHOPIFY_API_KEY || 'build-placeholder' }}
          SHOPIFY_API_SECRET: ${{ secrets.SHOPIFY_API_SECRET || 'build-placeholder' }}
          SHOPIFY_APP_URL: ${{ secrets.SHOPIFY_APP_URL || 'https://placeholder.example.com' }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY || 'AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=' }}
          INTERNAL_ADMIN_PASSWORD: ${{ secrets.INTERNAL_ADMIN_PASSWORD || 'build-placeholder' }}
          INTERNAL_ADMIN_SESSION_SECRET: ${{ secrets.INTERNAL_ADMIN_SESSION_SECRET || 'build-placeholder' }}

# ─── Optional: Live LLM eval workflow (nightly) ──────────────────────────
# Add a separate .github/workflows/evals-live.yml with:
#   on:
#     schedule: [{ cron: '0 3 * * *' }]
#     workflow_dispatch:
#   jobs:
#     evals-live:
#       environment: production
#       steps:
#         ... (same as evals job above but with EVAL_PROVIDER_ID secret set)
