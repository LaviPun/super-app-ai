name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  # Nightly quality flywheel (Phase 5b): the deterministic eval suite + optional
  # live tournament run + trend gate. Manual runs via the Actions tab too.
  schedule:
    - cron: '0 3 * * *' # 03:00 UTC daily
  workflow_dispatch: {}

# Shared env block — no secrets here (safe for forks and PRs)
env:
  NODE_ENV: test
  DATABASE_URL: file:./dev.db
  SHOPIFY_API_KEY: ci-placeholder
  SHOPIFY_API_SECRET: ci-placeholder
  SHOPIFY_APP_URL: https://placeholder.example.com
  SCOPES: read_products
  # 32-byte all-zeros key — safe for tests only
  ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
  INTERNAL_ADMIN_PASSWORD: ci-placeholder
  INTERNAL_ADMIN_SESSION_SECRET: ci-placeholder
  CRON_SECRET: ci-placeholder

jobs:
  # ─── Job 1: Quality gates (fast, no secrets) ─────────────────────────────
  quality:
    name: Lint · Typecheck · Prisma Validate
    runs-on: ubuntu-latest
    # Skip the PR/push pipeline on the nightly schedule; every other job needs
    # `quality` (transitively), so gating it here skips the whole PR pipeline on
    # the cron tick. The nightly `evals-nightly` job runs standalone instead.
    if: github.event_name != 'schedule'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (web)
        run: pnpm --filter web lint

      - name: Typecheck (web)
        run: pnpm --filter web typecheck

      - name: Typecheck (core)
        run: pnpm --filter @superapp/core typecheck

      - name: Typecheck (rate-limit)
        run: pnpm --filter @superapp/rate-limit typecheck

      - name: Typecheck (platform-contracts)
        run: pnpm --filter @superapp/platform-contracts typecheck

      - name: Typecheck (job-orchestration)
        run: pnpm --filter @superapp/job-orchestration typecheck

      - name: Typecheck (workers)
        run: pnpm --filter @superapp/workers typecheck

      - name: Typecheck (api)
        run: pnpm --filter @superapp/api typecheck

      - name: Prisma validate
        working-directory: apps/web
        run: pnpm exec prisma validate

  # ─── Job 2: Unit tests ───────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: apps/web
        run: pnpm exec prisma generate

      - name: Test (all packages)
        run: pnpm test

  # ─── Job 3: Internal admin Playwright smoke ───────────────────────────────
  e2e-internal:
    name: E2E Internal (Playwright)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Prisma schema
        working-directory: apps/web
        run: pnpm exec prisma db push --skip-generate

      - name: Install Playwright browser
        working-directory: apps/web
        run: pnpm test:e2e:install

      - name: Start web dev server
        working-directory: apps/web
        run: pnpm dev -- --port 4000 > /tmp/web-dev.log 2>&1 &

      - name: Wait for app to boot
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:4000/internal/login >/dev/null; then
              echo "App is up"
              exit 0
            fi
            sleep 2
          done
          echo "App did not start in time"
          cat /tmp/web-dev.log || true
          exit 1

      - name: Run internal AI smoke (probe + stream)
        working-directory: apps/web
        env:
          SMOKE_BASE_URL: http://127.0.0.1:4000
          SMOKE_WITH_STREAM: '1'
        run: pnpm smoke:internal-ai

      - name: Run Playwright internal suite
        working-directory: apps/web
        run: pnpm test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore

      - name: Upload app logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: web-dev-log
          path: /tmp/web-dev.log
          if-no-files-found: ignore

  # ─── Job 4: AI Regression Suite (golden fixtures, no LLM) ─────────────────
  #
  # Runs the golden-fixture eval suite using StubLlmClient.
  # Three quality gates enforced:
  #   • Schema-valid rate  ≥ 99%  (EVAL_THRESHOLD_SCHEMA)
  #   • Compiler-success rate ≥ 99%  (EVAL_THRESHOLD_COMPILER)
  #   • Non-destructive rate = 100%  (EVAL_THRESHOLD_ND — hard requirement)
  #
  # For live LLM eval (nightly or manual):
  #   Set EVAL_PROVIDER_ID secret and run pnpm --filter web evals in a
  #   separate workflow with environment: production.
  evals:
    name: AI Regression Suite
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: apps/web
        run: pnpm exec prisma generate

      - name: Run AI regression suite (golden fixtures, strict gate)
        working-directory: apps/web
        run: pnpm evals --strict
        env:
          # No EVAL_PROVIDER_ID → uses StubLlmClient (deterministic, no API key)
          EVAL_THRESHOLD_SCHEMA: '0.99'
          EVAL_THRESHOLD_COMPILER: '0.99'
          EVAL_THRESHOLD_ND: '1.0'

  # ─── Job 5: Build ───────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, e2e-internal, evals]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (web)
        working-directory: apps/web
        run: pnpm build
        env:
          NODE_ENV: production
          SHOPIFY_API_KEY: ${{ secrets.SHOPIFY_API_KEY || 'build-placeholder' }}
          SHOPIFY_API_SECRET: ${{ secrets.SHOPIFY_API_SECRET || 'build-placeholder' }}
          SHOPIFY_APP_URL: ${{ secrets.SHOPIFY_APP_URL || 'https://placeholder.example.com' }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY || 'AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=' }}
          INTERNAL_ADMIN_PASSWORD: ${{ secrets.INTERNAL_ADMIN_PASSWORD || 'build-placeholder' }}
          INTERNAL_ADMIN_SESSION_SECRET: ${{ secrets.INTERNAL_ADMIN_SESSION_SECRET || 'build-placeholder' }}

  # ─── Job 6: Nightly quality flywheel (schedule / manual only) ─────────────
  #
  # Runs the FULL golden-prompt eval suite deterministically (StubLlmClient, free)
  # and, when a provider key secret exists, an OPTIONAL live tournament over ~10
  # representative prompts. Emits a machine-readable report JSON (artifact) + a
  # JSONL history line, then runs the trend gate: fails if avgQualityScore dropped
  # >10% vs the trailing median. History persists across runs via actions/cache.
  #
  # Never runs on PR/push (guarded by event_name) and never prints secrets — the
  # live tier self-guards on key presence inside run-eval-report.ts.
  evals-nightly:
    name: Nightly Eval Flywheel
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: apps/web
        run: pnpm exec prisma generate

      # Rolling cache: restore the latest history, save a fresh copy each run.
      - name: Restore eval history
        uses: actions/cache@v4
        with:
          path: apps/web/scripts/eval-out/history.jsonl
          key: eval-history-${{ github.run_id }}
          restore-keys: |
            eval-history-

      - name: Run nightly eval report
        working-directory: apps/web
        # The live tier self-guards: it only runs when EVAL_LIVE=1 AND a provider
        # key is present. When the secret is empty the report is deterministic-only.
        env:
          EVAL_LIVE: ${{ secrets.ANTHROPIC_API_KEY != '' && '1' || '0' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          mkdir -p scripts/eval-out
          pnpm evals:report --out scripts/eval-out | tee scripts/eval-out/run.log
          # The current report is the newest eval-report-*.json.
          REPORT=$(ls -t scripts/eval-out/eval-report-*.json | head -n1)
          echo "REPORT_PATH=$REPORT" >> "$GITHUB_ENV"

      - name: Trend gate (fail on >10% quality regression)
        working-directory: apps/web
        # Runs against the PRIOR history (current run not yet appended), so the
        # gate compares this run to the baseline before recording it.
        run: pnpm evals:trend-gate --report "$REPORT_PATH" --history scripts/eval-out/history.jsonl

      - name: Append current run to history
        if: always()
        working-directory: apps/web
        run: |
          LINE=$(grep '^EVAL_REPORT_JSONL ' scripts/eval-out/run.log | tail -n1 | sed 's/^EVAL_REPORT_JSONL //')
          if [ -n "$LINE" ]; then
            echo "$LINE" >> scripts/eval-out/history.jsonl
            echo "Appended nightly report to history.jsonl ($(wc -l < scripts/eval-out/history.jsonl) rows)."
          fi

      - name: Upload eval report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: |
            apps/web/scripts/eval-out/eval-report-*.json
            apps/web/scripts/eval-out/history.jsonl
          if-no-files-found: warn
