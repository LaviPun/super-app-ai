name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    name: Typecheck · Test · Build · Prisma Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (web)
        run: pnpm --filter web lint
        env:
          NODE_ENV: test

      - name: Typecheck (web)
        run: pnpm --filter web exec tsc --noEmit

      - name: Typecheck (core)
        run: pnpm --filter @superapp/core exec tsc --noEmit

      - name: Typecheck (rate-limit)
        run: pnpm --filter @superapp/rate-limit exec tsc --noEmit

      - name: Prisma validate
        working-directory: apps/web
        run: pnpm exec prisma validate
        env:
          DATABASE_URL: file:./dev.db

      - name: Test (all packages)
        run: pnpm test
        env:
          NODE_ENV: test
          DATABASE_URL: file:./dev.db
          SHOPIFY_API_KEY: test
          SHOPIFY_API_SECRET: test
          SHOPIFY_APP_URL: https://example.com
          SCOPES: read_products
          ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          INTERNAL_ADMIN_PASSWORD: test
          INTERNAL_ADMIN_SESSION_SECRET: test
          CRON_SECRET: test-cron-secret

      - name: Build (web)
        run: pnpm --filter web build
        env:
          NODE_ENV: production
          DATABASE_URL: file:./dev.db
          SHOPIFY_API_KEY: ${{ secrets.SHOPIFY_API_KEY || 'build-placeholder' }}
          SHOPIFY_API_SECRET: ${{ secrets.SHOPIFY_API_SECRET || 'build-placeholder' }}
          SHOPIFY_APP_URL: ${{ secrets.SHOPIFY_APP_URL || 'https://placeholder.example.com' }}
          SCOPES: read_products
          ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          INTERNAL_ADMIN_PASSWORD: build-placeholder
          INTERNAL_ADMIN_SESSION_SECRET: build-placeholder
