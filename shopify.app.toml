# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "675f836397310b8c66a6ca2b5a49923c"
name = "Super App AI"
application_url = "http://localhost:3000"
embedded = true

# Monorepo: web app lives in apps/web; CLI uses this when you run `shopify app dev` from repo root
web_directories = ["apps/web"]

[build]
# So dev uses the tunnel URL (HTTPS) and the admin iframe can load the app
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-01"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_themes,read_products,write_products,read_orders,write_discounts,write_checkouts,write_app_proxy,write_payment_customizations,write_delivery_customizations,write_cart_transforms"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [ ]
