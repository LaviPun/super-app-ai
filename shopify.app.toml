# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "675f836397310b8c66a6ca2b5a49923c"
web_directories = [ "apps/web" ]
name = "Super App AI"
application_url = "https://distribution-episode-editors-ordinary.trycloudflare.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

[[webhooks.subscriptions]]
uri = "/webhooks/customers/data_request"
compliance_topics = [ "customers/data_request" ]

[[webhooks.subscriptions]]
uri = "/webhooks/customers/redact"
compliance_topics = [ "customers/redact" ]

[[webhooks.subscriptions]]
uri = "/webhooks/shop/redact"
compliance_topics = [ "shop/redact" ]

[[webhooks.subscriptions]]
topics = [ "app/uninstalled" ]
uri = "/webhooks"

[[webhooks.subscriptions]]
topics = [ "app/scopes_update" ]
uri = "/webhooks"

[[webhooks.subscriptions]]
topics = [ "orders/create" ]
uri = "/webhooks"

[[webhooks.subscriptions]]
topics = [ "products/update" ]
uri = "/webhooks"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# read_themes powers theme reads (theme list, theme.files) and is required.
scopes = "read_customers,read_metaobjects,read_products,read_themes,write_app_proxy,write_customers,write_metaobjects,write_orders"
# write_themes (033) — required to write native sections/superapp-*.liquid files via the
# Theme Files API (themeFilesUpsert). It is OPTIONAL here (not in `scopes`) so installs do
# not break before the grant lands. IMPORTANT: write_themes additionally requires a Shopify
# EXEMPTION (the "page-builder" exception, BFS §3.2.2) to actually modify theme files — the
# scope alone is not enough. Until that exemption is granted this scope is INERT and the
# native-section path (THEME_NATIVE_SECTION_ENABLED) stays a no-op; the app-block path is the
# shipping default. See specs/033-theme-edit-api/design.md §2.2, §8.
optional_scopes = [ "write_themes" ]
use_legacy_install_flow = false

[app_proxy]
url = "/proxy"
prefix = "apps"
subpath = "superapp"

[sidekick]
# Required when the app has any Sidekick-eligible extensions (256-token limit).
# Consolidated summary Sidekick uses to route merchant questions to us.
extensions_summary = "Search and report on Super App AI generated modules (storefront popups, banners, bundles, upsells, discount and cart-transform Functions, recommendation blocks, and admin/POS/checkout/customer-account blocks), including each module's status, type, version, and performance; and Create, Configure, and Publish those modules from a natural-language request. All create, configure, and publish actions open the app for the merchant to review and confirm — nothing changes in the store automatically."

[auth]
redirect_urls = [ ]

