# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "675f836397310b8c66a6ca2b5a49923c"
web_directories = [ "apps/web" ]
name = "Super App AI"
application_url = "https://distribution-episode-editors-ordinary.trycloudflare.com"
embedded = true

# Deploy scan allow-list. By default Shopify CLI scans every extensions/* dir; we pin an
# explicit list so `shopify app deploy` EXCLUDES the two unstable-API Function extensions
# (superapp-local-pickup, superapp-pickup-point — api_version = "unstable", needs_runtime)
# until the local-pickup / pickup-point delivery-option APIs stabilize on a dated version.
# They stay on disk (buildable + `config validate` green) but out of the deployed app
# version. Re-add their dirs here once they're pinned to a stable api_version.
#
# ALSO EXCLUDED: superapp-pos-block. Its config declares developer-preview-only POS
# targets (pos.*.event.observe + pos.return.post/exchange.post.*) which can't deploy to
# production stores and make `shopify app dev`'s "update dev preview" step fail for the
# WHOLE app. It stays on disk with every target intact (api_version 2026-07); re-add the
# dir once those surfaces graduate from developer preview, or once the app/store is
# enrolled in the POS UI-extensions developer preview.
# NOTE: `.shopifyignore` is a THEME-CLI mechanism and does NOT gate app-extension deploys —
# extension_directories is the documented app control (see shopify.dev app-structure).
extension_directories = [
  "extensions/admin-link",
  "extensions/admin-print",
  "extensions/admin-segment-template",
  "extensions/admin-ui",
  "extensions/checkout-ui",
  "extensions/customer-account-ui",
  "extensions/discount-function-settings",
  "extensions/superapp-cart-checkout-validation",
  "extensions/superapp-cart-transform",
  "extensions/superapp-delivery-customization",
  "extensions/superapp-discount",
  "extensions/superapp-flow-action-send-http",
  "extensions/superapp-flow-action-send-notification",
  "extensions/superapp-flow-action-tag-order",
  "extensions/superapp-flow-action-write-store",
  "extensions/superapp-flow-trigger-connector-synced",
  "extensions/superapp-flow-trigger-data-record-created",
  "extensions/superapp-flow-trigger-module-published",
  "extensions/superapp-flow-trigger-workflow-completed",
  "extensions/superapp-flow-trigger-workflow-failed",
  "extensions/superapp-fulfillment-constraints",
  "extensions/superapp-order-routing",
  "extensions/superapp-payment-customization",
  # "extensions/superapp-pos-block",  # dev-preview-only POS targets — see note above
  "extensions/superapp-shipping-discount",
  "extensions/superapp-sidekick-data",
  "extensions/superapp-web-pixel",
  "extensions/theme-app-extension",
]

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

[[webhooks.subscriptions]]
uri = "/webhooks/customers/data_request"
compliance_topics = [ "customers/data_request" ]

[[webhooks.subscriptions]]
uri = "/webhooks/customers/redact"
compliance_topics = [ "customers/redact" ]

[[webhooks.subscriptions]]
uri = "/webhooks/shop/redact"
compliance_topics = [ "shop/redact" ]

[[webhooks.subscriptions]]
topics = [ "app/uninstalled" ]
uri = "/webhooks"

[[webhooks.subscriptions]]
topics = [ "app/scopes_update" ]
uri = "/webhooks"

[[webhooks.subscriptions]]
topics = [ "orders/create" ]
uri = "/webhooks"

[[webhooks.subscriptions]]
topics = [ "products/update" ]
uri = "/webhooks"

# integration.httpSync trigger topics (build #7a). Only topics whose required scope the
# app already holds are declared, so `shopify app config validate` stays green:
#   customers/create  → read_customers ✓   collections/create → read_products ✓
# fulfillments/create (needs read_fulfillments) and draft_orders/create (needs
# read_draft_orders) are SUPPORTED by the runner's trigger map but NOT declared here —
# they require scopes the app doesn't request yet; add the scope + the subscription
# together when that sync is needed (kept honest rather than declaring an inert topic
# the app can't receive).
[[webhooks.subscriptions]]
topics = [ "customers/create" ]
uri = "/webhooks"

[[webhooks.subscriptions]]
topics = [ "collections/create" ]
uri = "/webhooks"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# read_themes powers theme reads (theme list, theme.files) and is required.
scopes = "read_customers,read_metaobjects,read_products,read_themes,write_app_proxy,write_customers,write_metaobjects,write_orders"
# write_themes (033) — required to write native sections/superapp-*.liquid files via the
# Theme Files API (themeFilesUpsert). It is OPTIONAL here (not in `scopes`) so installs do
# not break before the grant lands. IMPORTANT: write_themes additionally requires a Shopify
# EXEMPTION (the "page-builder" exception, BFS §3.2.2) to actually modify theme files — the
# scope alone is not enough. Until that exemption is granted this scope is INERT and the
# native-section path (THEME_NATIVE_SECTION_ENABLED) stays a no-op; the app-block path is the
# shipping default. See specs/033-theme-edit-api/design.md §2.2, §8.
optional_scopes = [ "write_themes" ]
use_legacy_install_flow = false

[app_proxy]
url = "/proxy"
prefix = "apps"
subpath = "superapp"

[sidekick]
# Required when the app has any Sidekick-eligible extensions (256-token limit).
# Consolidated summary Sidekick uses to route merchant questions to us.
extensions_summary = "Search and report on Super App AI generated modules (storefront popups, banners, bundles, upsells, discount and cart-transform Functions, recommendation blocks, and admin/POS/checkout/customer-account blocks), including each module's status, type, version, and performance."

[auth]
redirect_urls = [ ]

