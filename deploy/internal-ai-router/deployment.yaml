apiVersion: apps/v1
kind: Deployment
metadata:
  name: internal-ai-router
  labels:
    app: internal-ai-router
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: internal-ai-router
  template:
    metadata:
      labels:
        app: internal-ai-router
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 10
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: internal-ai-router
          # Build and push from apps/web/Dockerfile.internal-router
          image: ghcr.io/your-org/ai-shopify-superapp-internal-router:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8787
          envFrom:
            - configMapRef:
                name: internal-ai-router-config
            - secretRef:
                name: internal-ai-router-secret
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 3
            timeoutSeconds: 2
            failureThreshold: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
