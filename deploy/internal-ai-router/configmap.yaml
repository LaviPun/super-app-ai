# Router env for apps/web/scripts/internal-ai-router.ts — see README.md in this folder.
# Verify after apply: kubectl -n <ns> port-forward svc/internal-ai-router 8787:8787 && curl -s http://127.0.0.1:8787/healthz
# Remix INTERNAL_AI_ROUTER_URL → this service for /route; same base can serve assistant Ollama chat when ROUTER_OLLAMA_BASE_URL points at Ollama (passthrough /api/tags, /api/chat).
apiVersion: v1
kind: ConfigMap
metadata:
  name: internal-ai-router-config
data:
  ROUTER_HOST: "0.0.0.0"
  ROUTER_PORT: "8787"
  ROUTER_BACKEND: "ollama"
  ROUTER_OLLAMA_BASE_URL: "http://ollama.ollama.svc.cluster.local:11434"
  ROUTER_OLLAMA_MODEL: "qwen3:4b-instruct"
  ROUTER_OPENAI_BASE_URL: "http://vllm.vllm.svc.cluster.local:8000/v1"
  ROUTER_OPENAI_MODEL: "Qwen/Qwen3-4B-Instruct"
  ROUTER_MODEL_TIMEOUT_MS: "2500"
  ROUTER_BODY_MAX_BYTES: "8192"
  ROUTER_RATE_WINDOW_MS: "60000"
  ROUTER_RATE_MAX_REQUESTS: "90"
