# SuperApp Admin Links — deep links from admin resource pages to the SuperApp.
#
# `admin_link` is a distinct Shopify extension TYPE and allows exactly ONE
# `[[extensions.targeting]]` per extension (one link = one target + relative url).
# So each admin link is its OWN `[[extensions]]` block with a single target, mirroring
# the shipped superapp-sidekick-* admin_link extensions. Shopify appends the store domain
# + the selected/displayed resource id to the url at click time, so `/app/link` can key
# off `?shop=…&id=…&resource=…` and route the merchant to the right SuperApp workflow.
# The published admin.link module config (superapp.admin/link_refs) carries the
# merchant-facing label + intended destination. `admin_link` extensions take no top-level
# `api_version` (the toml registration itself is the deployed artifact).

# Order pages → SuperApp order workflow.
[[extensions]]
name = "Open order in SuperApp"
handle = "admin-link-order-details"
uid = "3c9467a9-ef95-47b8-83ce-53a3e537387a"
type = "admin_link"

[[extensions.targeting]]
target = "admin.order-details.action.link"
url = "/app/link?resource=order"

[[extensions]]
name = "Open selected orders in SuperApp"
handle = "admin-link-order-index"
uid = "af5e3917-04f3-4ad1-abd4-df1f9ab847cd"
type = "admin_link"

[[extensions.targeting]]
target = "admin.order-index.selection-action.link"
url = "/app/link?resource=order&bulk=1"

