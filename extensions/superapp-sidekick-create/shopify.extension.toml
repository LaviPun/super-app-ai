[[extensions]]
name = "Super App AI Sidekick create"
handle = "superapp-sidekick-create"
uid = "e84203ed-b1d6-40ad-8eec-8698f7959f34e84203ed"
type = "admin_link"
# Sidekick reads this to decide relevance (256-token limit).
description = "Create a new Super App AI module from a natural-language description — a storefront popup, banner, bundle, upsell, discount or cart-transform Function, or recommendation block. Opens the Super App AI generator seeded with the merchant's prompt so they review and confirm the generated module before it is saved or published."

# Navigation intent → the Super App AI generate workspace, seeded with the prompt.
[[extensions.targeting]]
target = "admin.app.intent.link"
url = "/generate"
tools = "./tools.json"
instructions = "./instructions.md"

  [[extensions.targeting.intents]]
  type = "application/superapp-module-create"
  action = "create"
  schema = "./create-schema.json"
