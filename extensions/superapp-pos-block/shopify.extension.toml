api_version = "2026-07"

[[extensions]]
type = "ui_extension"
# Change the merchant-facing name of the extension in locales/en.default.json
name = "t:name"
uid = "aed5fbce-2cf2-152e-92bf-cbe7518a38f25cc8a76c"
handle = "superapp-pos-block"
description = "A preact POS UI extension"

# App Authentication: POS attaches a session token to requests to the app's own
# domain so the block can read its published module config from /api/pos/config.
[extensions.capabilities]
api_access = true

# module: path to the file that contains your extension’s source code
# target: string that describes where your extension appears in POS
#
# One generic, config-driven extension covers the full POS surface. Every entry
# reads the shop's PUBLISHED pos.extension config from /api/pos/config and renders
# / acts from it (no per-module code). Entries by kind:
#   Tile.jsx     — smart-grid tile (home)            → presents Modal via presentModal()
#   Modal.jsx    — full-screen modal / action overlay → home.modal + every *.action.render
#   MenuItem.jsx — action menu-item button           → every *.action.menu-item.render (presents Modal)
#   Block.jsx    — inline details section            → every *.block.render
#   Receipt.jsx  — print-only header/footer block    → receipt-header / receipt-footer
#   Observer.js  — UI-less background event handler   → the 4 *.event.observe targets

# ── Home smart grid: tile ↔ modal pairing ───────────────────────────────────
[[extensions.targeting]]
module = "./src/Tile.jsx"
target = "pos.home.tile.render"

[[extensions.targeting]]
module = "./src/Modal.jsx"
target = "pos.home.modal.render"

# ── Product details: block · menu-item ↔ action modal ───────────────────────
[[extensions.targeting]]
module = "./src/Block.jsx"
target = "pos.product-details.block.render"

[[extensions.targeting]]
module = "./src/MenuItem.jsx"
target = "pos.product-details.action.menu-item.render"

[[extensions.targeting]]
module = "./src/Modal.jsx"
target = "pos.product-details.action.render"

# ── Customer details: block · menu-item ↔ action modal ──────────────────────
[[extensions.targeting]]
