api_version = "2026-04"

[[extensions]]
type = "ui_extension"
# Change the merchant-facing name of the extension in locales/en.default.json
name = "t:name"
uid = "aed5fbce-2cf2-152e-92bf-cbe7518a38f25cc8a76c"
handle = "superapp-pos-block"
description = "A preact POS UI extension"

# App Authentication: POS attaches a session token to requests to the app's own
# domain so the block can read its published module config from /api/pos/config.
[extensions.capabilities]
api_access = true

# module: path to the file that contains your extension’s source code
# target: string that describes where your extension appears in POS
[[extensions.targeting]]
module = "./src/Action.jsx"
target = "pos.product-details.action.render"

[[extensions.targeting]]
module = "./src/Block.jsx"
target = "pos.product-details.block.render"
