# Theme Check configuration for the SuperApp theme app extension.
#
# Inherits the theme-app-extension preset (what a config-less run already used)
# and overrides ONLY AssetSizeAppBlockJavaScript.
#
# AssetSizeAppBlockJavaScript threshold raised from the 10 KB default to 40 KB.
# Rationale (R2.1): the display-rules RUNTIME EVALUATOR was added to
# assets/superapp-modules.js (a hand-ported, parity-tested port of the TS
# rule-engine so a merchant-authored condition gates module visibility on the
# storefront) — ~10 KB of vanilla dependency-free JS, taking the file over the
# 10 KB default.
# Rationale (V-B, 30 KB → 40 KB): the conversion-core runtimes were added — a
# shared theme-agnostic CART OBSERVER (fetch-wrap + cart events), the standard
# Shopify MONEY FORMATTER, the cart-goal PROGRESS BAR, the POST-ADD-TO-CART OFFER
# modal (+ static recommendation resolver), and the STICKY ATC v2 (variant/qty +
# /cart/add.js). All dependency-free vanilla JS; the single bundled file stays
# ~33 KB minified and gzips well under the wire budget. The source-size threshold
# tracks the shipped runtime surface. All other checks stay at preset defaults.
extends: :theme_app_extension

AssetSizeAppBlockJavaScript:
  enabled: true
  threshold_in_bytes: 40000
