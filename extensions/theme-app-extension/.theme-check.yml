# Theme Check configuration for the SuperApp theme app extension.
#
# Inherits the theme-app-extension preset (what a config-less run already used)
# and overrides ONLY AssetSizeAppBlockJavaScript.
#
# AssetSizeAppBlockJavaScript threshold raised from the 10 KB default to 40 KB.
# Rationale (R2.1): the display-rules RUNTIME EVALUATOR was added to
# assets/superapp-modules.js (a hand-ported, parity-tested port of the TS
# rule-engine so a merchant-authored condition gates module visibility on the
# storefront) — ~10 KB of vanilla dependency-free JS, taking the file over the
# 10 KB default.
# Rationale (V-B, 30 KB → 40 KB): the conversion-core runtimes were added — a
# shared theme-agnostic CART OBSERVER (fetch-wrap + cart events), the standard
# Shopify MONEY FORMATTER, the cart-goal PROGRESS BAR, the POST-ADD-TO-CART OFFER
# modal (+ static recommendation resolver), and the STICKY ATC v2 (variant/qty +
# /cart/add.js). All dependency-free vanilla JS; the single bundled file stays
# ~33 KB minified and gzips well under the wire budget. The source-size threshold
# tracks the shipped runtime surface. All other checks stay at preset defaults.
# Rationale (V-B renderer batch B9–B12, 40 KB → 56 KB): the renderer batch moved
# four richer surfaces into JS-progressive-enhancement so the AGGREGATE 100 KB
# Liquid wall (shared across all TAE files, Shopify-enforced) stays clear — a
# before/after comparison slider (pointer drag + keyboard ARIA slider), shoppable
# image HOTSPOTS (positioned markers + focus-trapped popover), TABS (full ARIA
# tablist keyboard model), and a mega-FAQ SEARCH layer (debounced client filter +
# category chips). Each ships a semantic in-DOM no-JS fallback (the Liquid stub);
# the behavior is vanilla dependency-free JS. This is a LINT threshold we own (not
# a Shopify wall) — raised to fit the added runtime; the minified asset still
# gzips well under the wire budget. Following the R2.1 / V-B precedent above.
# Rationale (V-B final batch B6/B7/B14, 56 KB → 64 KB): three more surfaces moved
# into JS to keep the Liquid aggregate clear — the multi-step FORM / capture
# stepper (per-field email/phone validation, consent honesty, back/next state),
# the A/B EXPERIMENT runtime (deterministic FNV-1a visitor bucketing + text-only
# variant overrides + data-sa-variant attribution), and the SALES-POP toast queue
# (rotating single-toast, session cap, reduced-motion instant swap). All the
# Liquid these need is a tiny JSON-config data attribute (the quiz variant is
# app-served on proxy.widget, costing ZERO TAE Liquid). Same reasoning as above:
# a lint ceiling we own, minified asset gzips to a fraction of the wire budget.
extends: :theme_app_extension

AssetSizeAppBlockJavaScript:
  enabled: true
  threshold_in_bytes: 64000

# AssetSizeAppBlockCSS raised from the 100 KB preset default to 120 KB.
# Rationale (V-B renderer batch B9–B12): the four new surfaces added their
# structural + two-pack CSS (before/after clip-path panes, hotspot markers +
# popover, tabgroup panels, FAQ search chips) to assets/superapp-modules.css,
# nudging the minified sheet over the 100 KB preset. Unlike the aggregate Liquid
# limit this is a theme-check LINT ceiling we own; the sheet still gzips to a
# fraction of the wire budget, so the threshold tracks the shipped style surface.
AssetSizeAppBlockCSS:
  enabled: true
  threshold_in_bytes: 120000
