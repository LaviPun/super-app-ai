api_version = "2026-04"

# ─────────────────────────────────────────────────────────────────────────────
# SuperApp generic customer-account UI extension (build #3, 034).
# ONE config-driven renderer mounted at every customer-account render target.
# Each per-target module (src/targets/*.tsx) is a one-line mountCaTarget call; the
# renderer reads its content from the published $app:superapp_customer_account_block
# metaobject and resolves live-data bindings via the Customer Account / Order API.
# No per-target code.
#
# Grouping rules (2026-04):
#  • Full-page targets (page.render, order.page.render) CANNOT coexist with any
#    other target in the same [[extensions]] — each gets its own extension block.
#  • The three *.block.render targets are the admin-placeable/mergeable Block set
#    (kept on the original shipped uid/handle to preserve deployed placements).
#  • All Static targets (render-after / announcement / order.action pair) share one
#    extension block.
# ─────────────────────────────────────────────────────────────────────────────

# ── Block-render targets (SHIPPED — preserve deployed handle/UID) ──────────────
[[extensions]]
uid = "8c6a1d28-a11d-3b1a-82ef-9374e1c146acf00e1297"
type = "ui_extension"
name = "SuperApp Customer Blocks"
handle = "superapp-customer-blocks"

[extensions.capabilities]
api_access = true
# Required so the block can fetch app-owned data (loyalty.points / subscription.*)
# from the storefront app proxy (`{proxyBase}/ca/customer-data`) — extensions run in a
# null-origin Web Worker, so any non-`shopify://` fetch needs network_access + a CORS
# `Access-Control-Allow-Origin` on the app response (see proxy.ca.customer-data.tsx).
network_access = true

[[extensions.targeting]]
module = "./src/targets/OrderIndexBlockRender.tsx"
target = "customer-account.order-index.block.render"

[[extensions.targeting]]
module = "./src/targets/OrderStatusBlockRender.tsx"
target = "customer-account.order-status.block.render"

[[extensions.targeting]]
module = "./src/targets/ProfileBlockRender.tsx"
target = "customer-account.profile.block.render"

# ── Full-page target: account page (own extension — full-page can't coexist) ───
[[extensions]]
uid = "a4f1c2d8-b3e5-4c6a-9d7e-1f2a3b4c5d6e"
type = "ui_extension"
name = "SuperApp Customer Page"
handle = "superapp-customer-page"

[extensions.capabilities]
api_access = true
# Required so the block can fetch app-owned data (loyalty.points / subscription.*)
# from the storefront app proxy (`{proxyBase}/ca/customer-data`) — extensions run in a
# null-origin Web Worker, so any non-`shopify://` fetch needs network_access + a CORS
# `Access-Control-Allow-Origin` on the app response (see proxy.ca.customer-data.tsx).
network_access = true

[[extensions.targeting]]
module = "./src/targets/PageRender.tsx"
target = "customer-account.page.render"

# ── Full-page target: order page (own extension — full-page can't coexist) ─────
[[extensions]]
uid = "b5e2d3c9-c4f6-5d7b-ae8f-2a3b4c5d6e7f"
type = "ui_extension"
name = "SuperApp Customer Order Page"
handle = "superapp-customer-order-page"

[extensions.capabilities]
api_access = true
# Required so the block can fetch app-owned data (loyalty.points / subscription.*)
