# null-origin Web Worker, so any non-`shopify://` fetch needs network_access + a CORS
# `Access-Control-Allow-Origin` on the app response (see proxy.ca.customer-data.tsx).
network_access = true

[[extensions.targeting]]
module = "./src/targets/OrderPageRender.tsx"
target = "customer-account.order.page.render"

# ── All Static targets (render-after / announcement / order.action pair) ───────
[[extensions]]
