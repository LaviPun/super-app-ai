api_version = "2026-04"

# ─────────────────────────────────────────────────────────────────────────────
# SuperApp generic checkout UI extension (build #2, 034).
# ONE config-driven renderer mounted at every checkout / thank-you RENDER target.
# Each per-target module (src/targets/*.tsx) is a one-line mountCheckoutTarget call;
# the renderer branches by target (interactive buyer-input writes on purchase.checkout.*,
# read-only on thank-you/order-status) and reads its content from the published
# \$app:superapp_checkout_upsell metaobject. No per-target code.
#
# The two address-autocomplete targets (purchase.address-autocomplete.suggest /
# .format-suggestion) are deliberately NOT registered: they are data-only callbacks
# (0 components) that require a real address-lookup service. Registering an
# empty-suggestion no-op would fabricate a non-functional integration, so they stay
# unregistered (they remain valid config targets for validation only).
# ─────────────────────────────────────────────────────────────────────────────

# ── Block-render targets (SHIPPED — preserve deployed handles/UIDs) ────────────
[[extensions]]
uid = "d7a1f2c6-c8b3-6d4a-af5c-1e8b2a3d7c6f"
type = "ui_extension"
name = "SuperApp Checkout Block"
handle = "superapp-checkout-block"

[extensions.capabilities]
api_access = true

[[extensions.targeting]]
module = "./src/blocks/Checkout.tsx"
target = "purchase.checkout.block.render"

[[extensions]]
uid = "e8b2a3d7-d9c4-7e5b-ba6d-2f9c3b4e8d7a"
type = "ui_extension"
name = "SuperApp Thank You Block"
handle = "superapp-thank-you-block"

[extensions.capabilities]
api_access = true

[[extensions.targeting]]
module = "./src/blocks/ThankYou.tsx"
target = "purchase.thank-you.block.render"

