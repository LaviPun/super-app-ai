query Input {
  cart {
    cost {
      subtotalAmount {
        amount
      }
    }
    lines {
      id
      cost {
        subtotalAmount {
          amount
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          sku
        }
      }
    }
  }
  discount {
    discountClasses
    metafield(namespace: "$app", key: "discount_config") {
      jsonValue
    }
  }
}
