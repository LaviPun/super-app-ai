query Input {
  cart {
    cost {
      subtotalAmount {
        amount
      }
    }
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
        }
        subtotalAmount {
          amount
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          sku
          product {
            id
          }
        }
      }
    }
  }
  discount {
    discountClasses
  }
  shop {
    metaobject(
      handle: { type: "$app:superapp_function_config", handle: "superapp-fn-discountRules" }
    ) {
      field(key: "config_json") {
        jsonValue
      }
    }
  }
}
