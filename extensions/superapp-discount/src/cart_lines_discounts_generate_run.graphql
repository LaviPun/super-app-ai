query Input {
  cart {
    cost {
      subtotalAmount {
        amount
      }
    }
    lines {
      id
      merchandise {
        __typename
        ... on ProductVariant {
          sku
        }
      }
    }
  }
  discount {
    discountClasses
  }
  shop {
    metaobject(
      handle: { type: "$app:superapp_function_config", handle: "superapp-fn-discountRules" }
    ) {
      field(key: "config_json") {
        jsonValue
      }
    }
  }
}
