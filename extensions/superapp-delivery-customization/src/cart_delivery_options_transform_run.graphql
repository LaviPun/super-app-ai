query CartDeliveryOptionsTransformRunInput {
  cart {
    cost {
      subtotalAmount {
        amount
      }
    }
    buyerIdentity {
      customer {
        id
        email
        numberOfOrders
      }
    }
    lines {
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            id
            productType
            vendor
          }
        }
      }
    }
    deliveryGroups {
      deliveryAddress {
        countryCode
        provinceCode
      }
      deliveryOptions {
        handle
        title
      }
    }
  }
  shop {
    metaobject(
      handle: { type: "$app:superapp_function_config", handle: "superapp-fn-deliveryCustomization" }
    ) {
      field(key: "config_json") {
        jsonValue
      }
    }
  }
}
