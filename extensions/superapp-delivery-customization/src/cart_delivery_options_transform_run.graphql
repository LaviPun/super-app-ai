query CartDeliveryOptionsTransformRunInput {
  cart {
    cost {
      subtotalAmount {
        amount
      }
    }
    deliveryGroups {
      deliveryAddress {
        countryCode
      }
      deliveryOptions {
        handle
        title
      }
    }
  }
  shop {
    metaobject(
      handle: { type: "$app:superapp_function_config", handle: "superapp-fn-deliveryCustomization" }
    ) {
      field(key: "config_json") {
        jsonValue
      }
    }
  }
}
