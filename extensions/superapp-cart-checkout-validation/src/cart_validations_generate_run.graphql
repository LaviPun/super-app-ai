query Input {
  cart {
    cost {
      subtotalAmount {
        amount
      }
    }
    deliveryGroups {
      deliveryAddress {
        countryCode
        provinceCode
      }
    }
    lines {
      quantity
      merchandise {
        __typename
        ... on ProductVariant {
          sku
          product {
            id
            productType
          }
        }
      }
    }
  }
  shop {
    metaobject(
      handle: { type: "$app:superapp_function_config", handle: "superapp-fn-cartAndCheckoutValidation" }
    ) {
      field(key: "config_json") {
        jsonValue
      }
    }
  }
}
