query Input {
  cart {
    cost {
      subtotalAmount {
        amount
        currencyCode
      }
    }
    lines {
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            id
            productType
            vendor
          }
        }
      }
    }
    deliveryGroups {
      deliveryAddress {
        countryCode
        provinceCode
      }
    }
  }
  paymentMethods {
    id
    name
  }
  shop {
    metaobject(
      handle: { type: "$app:superapp_function_config", handle: "superapp-fn-paymentCustomization" }
    ) {
      field(key: "config_json") {
        jsonValue
      }
    }
  }
}
