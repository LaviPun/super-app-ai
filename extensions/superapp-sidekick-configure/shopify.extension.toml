[[extensions]]
name = "Super App AI Sidekick configure"
handle = "superapp-sidekick-configure"
uid = "59c01f25-26be-4227-ab4b-ce209fc3053959c01f25"
type = "admin_link"
# Sidekick reads this to decide relevance (256-token limit).
description = "Open an existing Super App AI module in its editor to change it — for example adjust a popup's copy, a banner's threshold, a countdown's duration, or an upsell's offer. Navigates the merchant to the module's page in Super App AI where they make and save the change themselves; nothing is modified automatically."

# Navigation intent → the Super App AI module detail/editor page.
[[extensions.targeting]]
target = "admin.app.intent.link"
url = "/modules/{id}"
tools = "./tools.json"
instructions = "./instructions.md"

  [[extensions.targeting.intents]]
  type = "application/superapp-module-configure"
  action = "edit"
  schema = "./configure-schema.json"
