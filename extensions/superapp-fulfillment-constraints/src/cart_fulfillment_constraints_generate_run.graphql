query Input {
  cart {
    deliverableLines {
      id
      merchandise {
        __typename
        ... on ProductVariant {
          sku
        }
      }
    }
  }
  shop {
    metaobject(
      handle: { type: "$app:superapp_function_config", handle: "superapp-fn-fulfillmentConstraints" }
    ) {
      field(key: "config_json") {
        jsonValue
      }
    }
  }
}
