  [[settings.fields]]
  type = "single_line_text_field"
  key = "Record ID"
  description = "The unique identifier of the new record."

  [[settings.fields]]
  type = "single_line_text_field"
  key = "Record Title"
  description = "The title of the created record."

  [[settings.fields]]
  type = "single_line_text_field"
  key = "Shop Domain"
  description = "The shop domain where the record was created."
